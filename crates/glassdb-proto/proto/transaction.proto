syntax = "proto3";

package glassdb;

import "google/protobuf/timestamp.proto";

message TransactionLog {
    enum Status {
        DEFAULT = 0;
        COMMITTED = 1;
        ABORTED = 2;
        PENDING = 3;
    }

    google.protobuf.Timestamp timestamp = 1;
    Status status = 2;
    repeated CollectionWrites writes = 3;
}

message CollectionWrites {
    CollectionPath collection = 1;
    repeated Write writes = 2;
    CollectionLocks locks = 3;
}

// A relocatable logical collection path. The database root comes from the
// enclosing transaction object's physical path and is deliberately omitted.
message CollectionPath {
    repeated bytes segments = 1;
}

message Write {
    bytes key = 1;
    // The ID of the last transaction writing to this key.
    bytes prev_tid = 3;

    oneof val_delete {
        bytes value = 2;
        bool deleted = 4;
    }
}

message CollectionLocks {
    repeated EntryLock entry_locks = 1;
    repeated LeafLock leaf_locks = 2;
}

message EntryLock {
    bytes key = 1;
    Lock.LockType lock_type = 2;
}

message LeafLock {
    oneof target {
        // The collection root object (`_i`). Always encoded as true.
        bool root = 1;
        // The opaque token of a standalone node object (`_n/<token>`).
        string node = 2;
    }
    Lock.LockType lock_type = 3;
    Lock.Scope scope = 4;
}

message Lock {
    enum LockType {
        UNKNOWN = 0;
        NONE = 1;
        READ = 2;
        WRITE = 3;
        CREATE = 4;
    }

    enum Scope {
        UNKNOWN_SCOPE = 0;
        STRUCTURE = 1;
        MEMBERSHIP = 2;
    }
}

message NodeLock {
    Lock.LockType lock_type = 1;
    repeated bytes locked_by = 2;
}

// A shard object: the coordination directory (lock table, MVCC current-writer
// index, and key directory) for the keys that map to it. See ADR-017.
message Shard {
    repeated ShardEntry entries = 1;
}

message ShardEntry {
    // Raw user key bytes; also the entry's sort key.
    bytes key = 1;
    // Lock currently held on the key.
    Lock.LockType lock_type = 2;
    // Transactions holding the lock (more than one only for read locks).
    repeated bytes locked_by = 3;
    // Transaction object holding the committed value (the MVCC pointer); empty
    // if the key has no committed value yet.
    bytes current_writer = 4;
    // Tombstone flag.
    bool deleted = 5;
}

// A B-link tree node: the unit of the dynamic, range-partitioned coordination
// directory (ADR-031). It is either a leaf (the per-key coordination entries of
// ADR-017 for a contiguous key range) or an index (separator keys mapping
// ranges to child nodes). The high-key and right-sibling make tree descent
// self-correcting across concurrent splits.
message Node {
    // Exclusive upper bound of the key range this node owns. Empty means
    // +infinity: the rightmost node at its level.
    bytes high_key = 1;
    // Identity token of the right-sibling node at the same level. Empty means
    // none: the rightmost node at its level.
    string right_sibling = 2;
    oneof body {
        // A leaf node: the per-key coordination entries for its range.
        Shard leaf = 3;
        // An index node: separator keys mapping ranges to child nodes.
        IndexNode index = 4;
    }
    NodeLock structure_lock = 5;
    NodeLock membership_lock = 6;
    uint64 membership_version = 7;
}

// A split write-ahead record. It lives at `{db}/_s/<record_id>` until the
// created nodes are either reachable or reclaimed.
message StructuralLog {
    string prefix = 1;
    string source_token = 2;
    string source_version = 3;
    repeated string created_tokens = 4;
    bytes split_key = 5;
    bool is_root = 6;
}

// An index node body: an ordered list of separator entries. The child owning a
// key is the last entry whose separator_key is <= the key.
message IndexNode {
    repeated IndexEntry entries = 1;
}

message IndexEntry {
    // Inclusive lower bound of the child's key range; sorted so the encoding is
    // canonical.
    bytes separator_key = 1;
    // Identity token of the child node.
    string child = 2;
}

// Database-level metadata, written once at `{name}/glassdb` when a database is
// first opened. Its presence marks the database as initialized; `version` gates
// on-disk format compatibility. A message (not a bare string) so new metadata
// fields can be added without breaking existing databases.
message DatabaseMetadata {
    // On-disk format version identifier (e.g. "v2").
    string version = 1;
}

// The collection root object `{prefix}/_i` (ADR-031). It *is* the B-link tree's
// root node - a leaf while the collection is small, an index once it grows - and
// also carries the collection metadata: the subcollection directory. Membership
// (create/delete) is coordinated per-key in the owning leaf, so the root holds
// no membership lock. Supersedes ADR-018's fixed-shard_count root.
message CollectionRoot {
    // The B-link tree root node. Its high-key is +infinity and its right-sibling
    // is empty (the root has no siblings).
    Node node = 1;
    // Child collection names (raw bytes), the subcollection directory; sorted so
    // the encoding is canonical.
    repeated bytes subcollections = 2;
}
