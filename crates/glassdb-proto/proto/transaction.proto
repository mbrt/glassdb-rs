syntax = "proto3";

package glassdb;

import "google/protobuf/timestamp.proto";

message TransactionLog {
    enum Status {
        DEFAULT = 0;
        COMMITTED = 1;
        ABORTED = 2;
        PENDING = 3;
    }

    google.protobuf.Timestamp timestamp = 1;
    Status status = 2;
    repeated CollectionWrites writes = 3;
}

message CollectionWrites {
    string prefix = 1;
    repeated Write writes = 2;
    CollectionLocks locks = 3;
}

message Write {
    string suffix = 1;
    // The ID of the last transaction writing to this key.
    bytes prev_tid = 3;

    oneof val_delete {
        bytes value = 2;
        bool deleted = 4;
    }
}

message CollectionLocks {
    Lock.LockType collection_lock = 2;
    repeated Lock locks = 3;
}

message Lock {
    enum LockType {
        UNKNOWN = 0;
        NONE = 1;
        READ = 2;
        WRITE = 3;
        CREATE = 4;
    }

    string suffix = 1;
    LockType lock_type = 2;
}

// A shard object: the coordination directory (lock table, MVCC current-writer
// index, and key directory) for the keys that map to it. See ADR-017.
message Shard {
    repeated ShardEntry entries = 1;
}

message ShardEntry {
    // Raw user key bytes; also the entry's sort key.
    bytes key = 1;
    // Lock currently held on the key.
    Lock.LockType lock_type = 2;
    // Transactions holding the lock (more than one only for read locks).
    repeated bytes locked_by = 3;
    // Transaction object holding the committed value (the MVCC pointer); empty
    // if the key has no committed value yet.
    bytes current_writer = 4;
    // Tombstone flag.
    bool deleted = 5;
}

// A B-link tree node: the unit of the dynamic, range-partitioned coordination
// directory (ADR-031). It is either a leaf (the per-key coordination entries of
// ADR-017 for a contiguous key range) or an index (separator keys mapping
// ranges to child nodes). The high-key and right-sibling make tree descent
// self-correcting across concurrent splits.
message Node {
    // Exclusive upper bound of the key range this node owns. Empty means
    // +infinity: the rightmost node at its level.
    bytes high_key = 1;
    // Identity token of the right-sibling node at the same level. Empty means
    // none: the rightmost node at its level.
    string right_sibling = 2;
    oneof body {
        // A leaf node: the per-key coordination entries for its range.
        Shard leaf = 3;
        // An index node: separator keys mapping ranges to child nodes.
        IndexNode index = 4;
    }
    // The node-level structure lock (ADR-032): guards the node's shape (entry
    // set as a physical unit, high-key, right-sibling, child pointers). Held
    // read by every data mutation and escalated scan, write by a split/merge.
    // Absent means unlocked.
    NodeLock structure_lock = 5;
    // The node-level membership lock (ADR-032): guards a leaf's live key set
    // (the predicate/gap). Held read by an escalated scan, write by create and
    // delete. Absent means unlocked; meaningful only on leaves.
    NodeLock membership_lock = 6;
    // The leaf's membership version (ADR-032): a monotonic counter bumped only
    // by membership-write activity (create/delete lock install, release, or
    // write-back), the OCC fast-path token for scans. Never bumped by scanner
    // read locks or by splits.
    uint64 membership_version = 7;
}

// A node-level read/write lock (ADR-032): the structure or membership lock that
// lives beside the per-key entry locks in a node object. Read locks share
// (multiple holders); a write lock is exclusive (a single holder).
message NodeLock {
    // The strength of the lock; NONE means unlocked.
    Lock.LockType lock_type = 1;
    // Transactions holding the lock (more than one only for a read lock);
    // sorted so the encoding is canonical.
    repeated bytes holders = 2;
}

// A structural-log record (ADR-032): the write-ahead note a split writes
// before creating any node object, so crash recovery can resolve an
// in-progress split from *structural* state (tree-reachability of the created
// nodes) rather than transaction status. Lives at `{db}/_s/<record_id>` and is
// deleted once the split's parent separator is published (or the orphan
// aborted). Replaces ADR-031's `_g/` split-active registry.
message StructuralLog {
    // The collection prefix the split runs in (e.g. `db/coll`), so recovery can
    // descend the right tree from a single global record listing.
    string prefix = 1;
    // The source node token (`_n/<token>`) the split shrinks. Empty when the
    // source is the collection root `_i` (an in-place root split).
    string source_token = 2;
    // The source object's CAS version at the time the record was written — the
    // version the shrink CAS is guarded by.
    string source_version = 3;
    // The freshly created node token(s): one right sibling for a leaf/interior
    // split, the two children for an in-place root split.
    repeated string created_tokens = 4;
    // The split key (the separator to publish into the parent). Empty for a
    // root split, which is referenced through `_i`'s index entries, not a
    // right-link separator.
    bytes split_key = 5;
    // Set when the source is the collection root `_i`: recovery tests root-split
    // completion by whether `_i` became an index over the children, not by a
    // right-link walk.
    bool is_root = 6;
}

// An index node body: an ordered list of separator entries. The child owning a
// key is the last entry whose separator_key is <= the key.
message IndexNode {
    repeated IndexEntry entries = 1;
}

message IndexEntry {
    // Inclusive lower bound of the child's key range; sorted so the encoding is
    // canonical.
    bytes separator_key = 1;
    // Identity token of the child node.
    string child = 2;
}

// Database-level metadata, written once at `{name}/glassdb` when a database is
// first opened. Its presence marks the database as initialized; `version` gates
// on-disk format compatibility. A message (not a bare string) so new metadata
// fields can be added without breaking existing databases.
message DatabaseMetadata {
    // On-disk format version identifier (e.g. "v2").
    string version = 1;
}

// The collection root object `{prefix}/_i` (ADR-031). It *is* the B-link tree's
// root node - a leaf while the collection is small, an index once it grows - and
// also carries the collection metadata: the subcollection directory. Membership
// (create/delete) is coordinated per-key in the owning leaf, so the root holds
// no membership lock. Supersedes ADR-018's fixed-shard_count root.
message CollectionRoot {
    // The B-link tree root node. Its high-key is +infinity and its right-sibling
    // is empty (the root has no siblings).
    Node node = 1;
    // Child collection names (raw bytes), the subcollection directory; sorted so
    // the encoding is canonical.
    repeated bytes subcollections = 2;
}
