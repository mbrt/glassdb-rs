[package]
name = "glassdb-concurr"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
async-trait = "0.1.89"
futures = "0.3.32"
tokio = { package = "madsim-tokio", version = "0.2", features = ["rt", "macros", "sync", "time", "rt-multi-thread", "test-util"] }

# Under `--cfg madsim` the deterministic simulator replaces tokio. madsim is
# only compiled in that configuration, so normal builds are unaffected.
[target.'cfg(madsim)'.dependencies]
madsim = "0.2"

[dev-dependencies]
